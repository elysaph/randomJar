<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="description" content="randomJar - Gamified productivity system" />
    <title>randomJar</title>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #070a14;
            color: #e4ecff;
            font-family: "Segoe UI", sans-serif;
        }

        .boot-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .boot-card {
            width: 100%;
            max-width: 720px;
            background: rgba(15, 24, 46, 0.92);
            border: 1px solid rgba(106, 131, 193, 0.36);
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 14px 32px rgba(4, 8, 20, 0.58);
        }

        .boot-title {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .boot-text {
            margin: 0;
            color: #9ba8cd;
        }
    </style>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
        <div class="boot-screen">
            <div class="boot-card">
                <h1 class="boot-title">Loading randomJar...</h1>
                <p class="boot-text">If this stays here, the app bundle did not start. Check DevTools console and hard
                    refresh.</p>
            </div>
        </div>
    </div>
    <script>
        window.setTimeout(function () {
            var root = document.getElementById('root');
            if (!root) {
                return;
            }
            if (root.childElementCount === 1 && root.textContent && root.textContent.indexOf('Loading randomJar') !== -1) {
                root.innerHTML = '<div class="boot-screen"><div class="boot-card"><h1 class="boot-title">App failed to start</h1><p class="boot-text">Try hard refresh (Ctrl+Shift+R), clear local storage keys <strong>randomJar-save-v1</strong> and <strong>goal-weighted-lottery</strong>, and restart with <strong>npm run start</strong>.</p></div></div>';
            }
        }, 5000);
    </script>
</body>

</html>
